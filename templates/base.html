<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Blog{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --danger: #dc2626;
            --border: #dbe3ee;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 35%, #f8fafc 100%);
            color: var(--text);
        }

        .container {
            width: min(960px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 56px;
        }

        .shell {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(219, 227, 238, 0.8);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.8);
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand strong {
            font-size: 1.1rem;
        }

        .brand span {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav a,
        .button,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease, background-color 0.15s ease, color 0.15s ease;
        }

        .nav a,
        .button.secondary {
            background: #edf2ff;
            color: var(--primary-dark);
        }

        .nav a:hover,
        .button.secondary:hover {
            background: #dbe6ff;
        }

        .button,
        button,
        .button.primary {
            background: var(--primary);
            color: #fff;
        }

        .button:hover,
        button:hover,
        .button.primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .content {
            padding: 28px 24px 36px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .page-lead {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.6;
        }

        .card-grid {
            display: grid;
            gap: 16px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
        }

        .article-link {
            text-decoration: none;
            color: var(--text);
        }

        .article-link:hover {
            color: var(--primary-dark);
        }

        .meta {
            color: var(--muted);
            font-size: 0.92rem;
            margin-top: 6px;
        }

        .form-grid {
            display: grid;
            gap: 14px;
            max-width: 720px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        label {
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px;
            font: inherit;
            background: #fff;
            color: var(--text);
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 18px 0 0;
        }

        .flash {
            padding: 12px 14px;
            border-radius: 14px;
            margin-bottom: 18px;
            background: #fef3c7;
            border: 1px solid #f59e0b;
            color: #92400e;
        }

        .article-body {
            line-height: 1.75;
        }

        .article-body h1,
        .article-body h2,
        .article-body h3 {
            margin-top: 1.4em;
        }

        .article-body a {
            color: var(--primary-dark);
        }

        @media (max-width: 720px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .content {
                padding: 20px 16px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shell">
            <header class="topbar">
                <div class="brand">
                    <strong>Personal Blog</strong>
                    <span>Simple reading and admin publishing</span>
                </div>
                <nav class="nav">
                    <a href="{{ url_for('home') }}">Home</a>
                    {% if session.get('admin') %}
                        <a href="{{ url_for('dashboard') }}">Dashboard</a>
                        <a href="{{ url_for('add_article') }}">Add Article</a>
                        <a href="{{ url_for('logout') }}">Logout</a>
                    {% else %}
                        <a href="{{ url_for('login') }}">Login</a>
                    {% endif %}
                </nav>
            </header>
            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>

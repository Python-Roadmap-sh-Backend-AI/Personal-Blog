{% extends "base.html" %}

{% block title %}Add Article | Personal Blog{% endblock %}

{% block content %}
<h1>Add Article</h1>
<p class="page-lead">Write a new post and publish it to the blog.</p>

<form method="POST" class="form-grid">
    <div class="field">
        <label for="title">Title</label>
        <input id="title" name="title" placeholder="Article title" required>
    </div>

    <div class="field">
        <label for="content">Content</label>
        <textarea id="content" name="content" placeholder="Write your article here" required></textarea>
    </div>

    <div class="field">
        <label for="date">Date</label>
        <input id="date" name="date" type="date" required>
    </div>

    <button type="submit">Save Article</button>
</form>
{% endblock %}

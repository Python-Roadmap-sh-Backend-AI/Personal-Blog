{% extends "base.html" %}

{% block title %}Edit Article | Personal Blog{% endblock %}

{% block content %}
<h1>Edit Article</h1>
<p class="page-lead">Update the article content and save your changes.</p>

<form method="POST" class="form-grid">
    <div class="field">
        <label for="content">Content</label>
        <textarea id="content" name="content" required>{{ content }}</textarea>
    </div>

    <button type="submit">Update Article</button>
</form>
{% endblock %}
